<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Bottom shell -->
  <ellipse cx="50" cy="66" rx="32" ry="13" fill="#FFC8D6" stroke="#FF89A7" stroke-width="2"/>
  <!-- Cream filling layer -->
  <ellipse cx="50" cy="52" rx="30" ry="5" fill="#FFF8E7" stroke="#FFD86B" stroke-width="1.5"/>
  <!-- Top shell (slightly deeper pink so the two shells read distinct) -->
  <ellipse cx="50" cy="40" rx="32" ry="13" fill="#FFB7B7" stroke="#FF89A7" stroke-width="2"/>
  <!-- Glossy highlight stripe on top shell -->
  <ellipse cx="40" cy="34" rx="10" ry="2.5" fill="#FFFFFF" opacity="0.55"/>
  <!-- Sparkle accents — keeps the event readable as a "pickup" treat -->
  <text x="78" y="22" font-size="10" fill="#FFD86B">✨</text>
  <text x="14" y="84" font-size="11" fill="#FFB7B7">♥</text>
  <!-- Tiny crumb dots beneath, for cottagecore detail -->
  <circle cx="22" cy="80" r="1.4" fill="#FFD86B" opacity="0.7"/>
  <circle cx="78" cy="80" r="1.4" fill="#FFD86B" opacity="0.7"/>
</svg>
