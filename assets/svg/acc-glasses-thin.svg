<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Bridge between lenses -->
  <line x1="44" y1="50" x2="56" y2="50" stroke="#8B5A2B" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left lens (half-moon — top arc only, scholarly look) -->
  <path d="M 18 50 Q 18 38 32 38 Q 44 38 44 50 Z"
        fill="#FFFFFF" fill-opacity="0.25"
        stroke="#8B5A2B" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Right lens (half-moon mirror) -->
  <path d="M 56 50 Q 56 38 68 38 Q 82 38 82 50 Z"
        fill="#FFFFFF" fill-opacity="0.25"
        stroke="#8B5A2B" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Lens highlight stripes (subtle glass shine) -->
  <line x1="22" y1="44" x2="28" y2="40" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="60" y1="44" x2="66" y2="40" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Temple arms (thin lines extending past lens edge) -->
  <line x1="18" y1="50" x2="10" y2="46" stroke="#8B5A2B" stroke-width="2" stroke-linecap="round"/>
  <line x1="82" y1="50" x2="90" y2="46" stroke="#8B5A2B" stroke-width="2" stroke-linecap="round"/>
  <!-- Tiny ✨ next to right lens for scholar charm -->
  <text x="74" y="32" font-size="8" fill="#FFD86B">✦</text>
</svg>
