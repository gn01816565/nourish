<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 智慧軸 seasonal: stationery set for Teacher's Day (TW 09-28).
       Earth-tone notebook + pencil + ink bottle, softened with cottagecore pinks. -->
  <!-- Soft pink ground shadow -->
  <ellipse cx="50" cy="86" rx="36" ry="3.5" fill="#FFC8D6" opacity="0.55"/>
  <!-- Notebook stack — bottom layer (cream) -->
  <rect x="14" y="62" width="50" height="22" rx="2.5" fill="#FFE8C8" stroke="#8B5A2B" stroke-width="2"/>
  <!-- Notebook top layer (rust pink) -->
  <rect x="20" y="50" width="44" height="20" rx="2.5" fill="#FFB7B7" stroke="#FF89A7" stroke-width="2"/>
  <!-- Top notebook spine binding band -->
  <rect x="20" y="50" width="6" height="20" fill="#B23A48" opacity="0.7"/>
  <!-- Notebook page lines -->
  <line x1="32" y1="58" x2="58" y2="58" stroke="#FF89A7" stroke-width="0.8" opacity="0.65"/>
  <line x1="32" y1="62" x2="58" y2="62" stroke="#FF89A7" stroke-width="0.8" opacity="0.65"/>
  <line x1="32" y1="66" x2="56" y2="66" stroke="#FF89A7" stroke-width="0.8" opacity="0.65"/>
  <!-- Pencil (lying diagonally on top of notebook) -->
  <g transform="rotate(-18 50 60)">
    <!-- Pencil body (yellow with brown stripe) -->
    <rect x="40" y="46" width="32" height="5" fill="#FFD86B" stroke="#8B5A2B" stroke-width="1.2"/>
    <!-- Pencil tip cone (wood + lead) -->
    <path d="M 72 46 L 80 48.5 L 72 51 Z" fill="#FFE8C8" stroke="#8B5A2B" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Lead point -->
    <line x1="78" y1="48.5" x2="80" y2="48.5" stroke="#2C2C2C" stroke-width="2" stroke-linecap="round"/>
    <!-- Eraser end (pink) -->
    <rect x="36" y="46" width="4" height="5" fill="#FF89A7" stroke="#8B5A2B" stroke-width="1.2"/>
  </g>
  <!-- Tiny ink bottle on right -->
  <rect x="72" y="48" width="12" height="14" rx="1.5" fill="#6BCBFF" fill-opacity="0.55" stroke="#FF89A7" stroke-width="1.5"/>
  <!-- Ink bottle cap -->
  <rect x="74" y="42" width="8" height="6" rx="1" fill="#8B5A2B" stroke="#5C3A1B" stroke-width="1.2"/>
  <!-- Ink label sticker -->
  <rect x="73.5" y="53" width="9" height="5" fill="#FFFFFF" opacity="0.8" stroke="#FF89A7" stroke-width="0.6"/>
  <!-- Tiny apple (teacher gift symbol) on far left top -->
  <circle cx="20" cy="40" r="5" fill="#B23A48" stroke="#8B2030" stroke-width="1.2"/>
  <line x1="20" y1="35" x2="22" y2="32" stroke="#3E8C4A" stroke-width="1.5" stroke-linecap="round"/>
  <ellipse cx="22" cy="32" rx="2" ry="1.2" fill="#6BCB77" stroke="#3E8C4A" stroke-width="0.8" transform="rotate(20 22 32)"/>
  <!-- Sparkle accents -->
  <text x="62" y="22" font-size="10" fill="#FFD86B">✦</text>
  <text x="84" y="84" font-size="8" fill="#FFB7B7">♥</text>
</svg>
