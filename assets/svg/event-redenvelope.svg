<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Red envelope main body -->
  <rect x="14" y="22" width="72" height="56" rx="4" fill="#B23A48" stroke="#8B2030" stroke-width="2"/>
  <!-- Top fold flap (slightly darker red triangle) -->
  <path d="M 14 22 L 50 48 L 86 22 Z" fill="#8B2030" stroke="#8B2030" stroke-width="2" stroke-linejoin="round"/>
  <!-- Center gold seal: lucky 福 character placeholder (use 福 directly) -->
  <circle cx="50" cy="56" r="14" fill="#FFD86B" stroke="#8B5A2B" stroke-width="2"/>
  <text x="50" y="62" font-size="18" fill="#B23A48" text-anchor="middle" font-weight="bold" font-family="serif">福</text>
  <!-- Decorative gold trim along envelope edges -->
  <line x1="18" y1="74" x2="82" y2="74" stroke="#FFD86B" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.8"/>
  <line x1="18" y1="26" x2="82" y2="26" stroke="#FFD86B" stroke-width="1.2" stroke-dasharray="2,2" opacity="0.5"/>
  <!-- Sparkle accents — celebratory pop -->
  <text x="80" y="20" font-size="11" fill="#FFD86B">✦</text>
  <text x="14" y="22" font-size="9" fill="#FFB7B7">♥</text>
  <circle cx="86" cy="74" r="1.6" fill="#FFD86B"/>
  <circle cx="12" cy="74" r="1.6" fill="#FFD86B"/>
</svg>
