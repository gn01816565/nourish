<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- kawaii-decora seasonal: White Day 03-14 — 多色禮盒堆疊 + ribbons + heart confetti.
       Fills 02-16 ~ 03-19 calendar gap between valentine (02-12~15) and sakura (03-20~05-10).
       「堆量 / pastel rainbow gift stack」narrative — 跟 minimalism「only 1」直接對立. -->
  <!-- Soft pink ground shadow -->
  <ellipse cx="50" cy="86" rx="36" ry="3" fill="#FFC8D6" opacity="0.55"/>
  <!-- Bottom gift box (largest, mint) -->
  <rect x="20" y="62" width="42" height="22" rx="2" fill="#6BCB77" fill-opacity="0.65" stroke="#8B5A2B" stroke-width="1.4"/>
  <line x1="41" y1="62" x2="41" y2="84" stroke="#FFB7B7" stroke-width="2.5"/>
  <line x1="20" y1="73" x2="62" y2="73" stroke="#FFB7B7" stroke-width="2.5"/>
  <!-- Bottom gift bow -->
  <path d="M 36 60 Q 32 56 36 54 Q 41 58 41 60 Q 41 58 46 54 Q 50 56 46 60 Z" fill="#FFB7B7" stroke="#FF89A7" stroke-width="0.8"/>
  <circle cx="41" cy="60" r="1.2" fill="#FF89A7"/>
  <!-- Middle gift box (lavender) -->
  <rect x="58" y="48" width="28" height="18" rx="2" fill="#D6C8FF" stroke="#8B5A2B" stroke-width="1.3"/>
  <line x1="72" y1="48" x2="72" y2="66" stroke="#FFD86B" stroke-width="2"/>
  <line x1="58" y1="57" x2="86" y2="57" stroke="#FFD86B" stroke-width="2"/>
  <!-- Middle gift bow -->
  <path d="M 68 46 Q 65 43 68 41 Q 72 44 72 46 Q 72 44 76 41 Q 79 43 76 46 Z" fill="#FFD86B" stroke="#8B5A2B" stroke-width="0.7"/>
  <circle cx="72" cy="46" r="1" fill="#8B5A2B"/>
  <!-- Top gift box (pink, smallest) -->
  <rect x="26" y="36" width="22" height="20" rx="2" fill="#FFB7B7" stroke="#FF89A7" stroke-width="1.3"/>
  <line x1="37" y1="36" x2="37" y2="56" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="26" y1="46" x2="48" y2="46" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Top gift bow -->
  <path d="M 33 34 Q 30 31 33 29 Q 37 32 37 34 Q 37 32 41 29 Q 44 31 41 34 Z" fill="#FFFFFF" stroke="#FF89A7" stroke-width="0.7"/>
  <circle cx="37" cy="34" r="1" fill="#FF89A7"/>
  <!-- Heart confetti scattered (kawaii narrative — 堆量) -->
  <text x="14" y="32" font-size="7" fill="#FFB7B7">♥</text>
  <text x="58" y="32" font-size="6" fill="#FF89A7">♥</text>
  <text x="86" y="40" font-size="5" fill="#D6C8FF">♥</text>
  <text x="14" y="58" font-size="5" fill="#6BCBFF">♥</text>
  <text x="86" y="76" font-size="6" fill="#FFD86B">♥</text>
  <!-- Multiple ✦ sparkles (kawaii-decora narrative) -->
  <text x="20" y="22" font-size="8" fill="#FFD86B">✦</text>
  <text x="72" y="22" font-size="6" fill="#FFB7B7">✦</text>
  <text x="86" y="58" font-size="6" fill="#6BCB77">✦</text>
  <!-- Soft pink corner accent dot (SOP consistency) -->
  <circle cx="14" cy="14" r="1.4" fill="#FFB7B7" opacity="0.85"/>
</svg>
