<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Book base shadow -->
  <ellipse cx="50" cy="84" rx="32" ry="4" fill="#FFC8D6" opacity="0.5"/>
  <!-- Open book — left page -->
  <path d="M 16 36 L 50 30 L 50 78 L 16 84 Z" fill="#FFF8E7" stroke="#8B5A2B" stroke-width="2"/>
  <!-- Open book — right page -->
  <path d="M 84 36 L 50 30 L 50 78 L 84 84 Z" fill="#FFF8E7" stroke="#8B5A2B" stroke-width="2"/>
  <!-- Spine highlight (binding line) -->
  <line x1="50" y1="30" x2="50" y2="78" stroke="#8B5A2B" stroke-width="2"/>
  <!-- Page text lines: left -->
  <line x1="22" y1="44" x2="44" y2="40" stroke="#FFB7B7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="50" x2="44" y2="46" stroke="#FFB7B7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="56" x2="40" y2="52" stroke="#FFB7B7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="62" x2="44" y2="58" stroke="#FFB7B7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="68" x2="38" y2="64" stroke="#FFB7B7" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Page text lines: right -->
  <line x1="56" y1="40" x2="78" y2="44" stroke="#FFB7B7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="56" y1="46" x2="78" y2="50" stroke="#FFB7B7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="56" y1="52" x2="76" y2="56" stroke="#FFB7B7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="56" y1="58" x2="78" y2="62" stroke="#FFB7B7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="56" y1="64" x2="74" y2="68" stroke="#FFB7B7" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Page-flip motion: a curved page rising from the right -->
  <path d="M 50 30 Q 66 20 76 28 Q 70 38 50 42 Z" fill="#FFFFFF" stroke="#8B5A2B" stroke-width="1.5" opacity="0.85"/>
  <!-- Sparkle ✦ — knowledge -->
  <text x="78" y="20" font-size="10" fill="#FFD86B">✦</text>
  <text x="14" y="22" font-size="8" fill="#6BCBFF">·</text>
  <text x="20" y="28" font-size="6" fill="#6BCBFF">·</text>
</svg>
