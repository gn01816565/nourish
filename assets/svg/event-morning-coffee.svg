<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- minimalist 2nd: morning coffee in a single white porcelain cup.
       Pure cream + thin grey/brown lines + 1 soft pink accent dot per CLAUDE.md TA "avoid cold". -->
  <!-- Soft pink shadow under saucer (TA soften, single ellipse) -->
  <ellipse cx="50" cy="84" rx="28" ry="2.8" fill="#FFC8D6" opacity="0.55"/>
  <!-- Saucer (flat white plate, thin grey rim) -->
  <ellipse cx="50" cy="80" rx="26" ry="4" fill="#FFFFFF" stroke="#8B5A2B" stroke-width="0.9" opacity="0.95"/>
  <!-- Saucer inner shadow (subtle) -->
  <ellipse cx="50" cy="80" rx="20" ry="2.6" fill="none" stroke="#FFE8C8" stroke-width="0.6" opacity="0.7"/>
  <!-- Cup body (white porcelain, thin brown rim — single shape, no extra ornament per minimalism) -->
  <path d="M 34 50 Q 34 76 50 78 Q 66 76 66 50 Z"
        fill="#FFFFFF" stroke="#8B5A2B" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- Cup rim (top opening ellipse) -->
  <ellipse cx="50" cy="50" rx="16" ry="3.2" fill="#FFE8C8" stroke="#8B5A2B" stroke-width="1.2"/>
  <!-- Coffee surface (single warm brown ellipse — minimal shading) -->
  <ellipse cx="50" cy="50" rx="13" ry="2.4" fill="#8B5A2B" opacity="0.85"/>
  <!-- Single coffee highlight (one tiny cream dot, minimalism = no multiple) -->
  <ellipse cx="46" cy="49.4" rx="2" ry="0.5" fill="#FFE8C8" opacity="0.75"/>
  <!-- Cup handle (thin curve on right, single stroke) -->
  <path d="M 66 56 Q 76 56 76 64 Q 76 72 66 72" fill="none" stroke="#8B5A2B" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Single steam wisp (one curved line, NOT multiple — minimalism narrative) -->
  <path d="M 50 44 Q 47 38 50 32 Q 53 26 50 20" fill="none" stroke="#8B5A2B" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
  <!-- Steam echo (very faint second line, depth only) -->
  <path d="M 56 44 Q 54 40 56 34" fill="none" stroke="#8B5A2B" stroke-width="0.7" stroke-linecap="round" opacity="0.35"/>
  <!-- Single coffee bean on saucer beside cup (minimalism = 1 accent, not many) -->
  <ellipse cx="74" cy="79" rx="2.8" ry="1.6" fill="#5C1A1F" stroke="#2C2C2C" stroke-width="0.4"/>
  <line x1="71.6" y1="79" x2="76.4" y2="79" stroke="#2C2C2C" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Soft pink corner accent dot (TA soften, single dot — minimalism allows 1 not堆量) -->
  <circle cx="22" cy="22" r="1.6" fill="#FFB7B7" opacity="0.85"/>
  <!-- Single sparkle ✦ (minimalism = 1, not multiple) -->
  <text x="78" y="30" font-size="8" fill="#FFD86B">✦</text>
</svg>
