<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Stick handle -->
  <line x1="50" y1="50" x2="50" y2="92" stroke="#8B5A2B" stroke-width="4" stroke-linecap="round"/>
  <!-- 4 alternating-color triangle blades around center hub (50,50) — quadrant fan -->
  <!-- Top blade (pink) -->
  <path d="M 50 50 L 50 14 L 70 26 Z" fill="#FFB7B7" stroke="#FF89A7" stroke-width="2" stroke-linejoin="round"/>
  <!-- Right blade (cyan) -->
  <path d="M 50 50 L 86 50 L 74 70 Z" fill="#6BCBFF" stroke="#5BA8DD" stroke-width="2" stroke-linejoin="round"/>
  <!-- Bottom blade (pink) -->
  <path d="M 50 50 L 50 86 L 30 74 Z" fill="#FFB7B7" stroke="#FF89A7" stroke-width="2" stroke-linejoin="round"/>
  <!-- Left blade (cyan) -->
  <path d="M 50 50 L 14 50 L 26 30 Z" fill="#6BCBFF" stroke="#5BA8DD" stroke-width="2" stroke-linejoin="round"/>
  <!-- Center hub button -->
  <circle cx="50" cy="50" r="5" fill="#FFD86B" stroke="#8B5A2B" stroke-width="1.5"/>
  <!-- Tiny inner dot for depth -->
  <circle cx="50" cy="50" r="1.5" fill="#8B5A2B"/>
  <!-- Motion arc hint (subtle curved line) — implies spinning -->
  <path d="M 80 22 Q 88 30 84 40" fill="none" stroke="#FFD86B" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 22 80 Q 14 72 18 62" fill="none" stroke="#FFD86B" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Sparkles -->
  <text x="80" y="20" font-size="9" fill="#FFD86B">✨</text>
  <text x="14" y="22" font-size="9" fill="#FFB7B7">♥</text>
</svg>
