<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Boho axis 3rd item: straw hat with rust band + tiny daisy.
       Earth-tone palette softened with cottagecore pinks per CLAUDE.md TA. -->
  <!-- Wide brim — soft ellipse base -->
  <ellipse cx="50" cy="68" rx="38" ry="8" fill="#FFE8C8" stroke="#8B5A2B" stroke-width="2"/>
  <!-- Brim shadow stripe (under-brim to give depth) -->
  <path d="M 14 68 Q 50 78 86 68" fill="none" stroke="#FF9F43" stroke-width="1.5" opacity="0.55"/>
  <!-- Crown — slightly pinched dome on top of brim -->
  <path d="M 28 60 Q 28 38 50 36 Q 72 38 72 60 Q 60 64 50 64 Q 40 64 28 60 Z"
        fill="#FFE8C8" stroke="#8B5A2B" stroke-width="2" stroke-linejoin="round"/>
  <!-- Straw weave detail lines on crown -->
  <path d="M 30 50 Q 50 54 70 50" fill="none" stroke="#FF9F43" stroke-width="1" opacity="0.45"/>
  <path d="M 30 56 Q 50 60 70 56" fill="none" stroke="#FF9F43" stroke-width="1" opacity="0.45"/>
  <line x1="34" y1="42" x2="36" y2="60" stroke="#FF9F43" stroke-width="0.8" opacity="0.4"/>
  <line x1="50" y1="38" x2="50" y2="62" stroke="#FF9F43" stroke-width="0.8" opacity="0.4"/>
  <line x1="66" y1="42" x2="64" y2="60" stroke="#FF9F43" stroke-width="0.8" opacity="0.4"/>
  <!-- Rust ribbon hatband (boho earth-tone) -->
  <path d="M 28 60 Q 50 64 72 60 Q 72 64 72 64 Q 50 68 28 64 Q 28 60 28 60 Z"
        fill="#B23A48" stroke="#8B2030" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Tiny side knot / bow on the band -->
  <ellipse cx="68" cy="62" rx="4" ry="2.5" fill="#B23A48" stroke="#8B2030" stroke-width="1.2"/>
  <!-- Small daisy decoration on right side of crown -->
  <g transform="translate(38 46)">
    <circle cx="0" cy="0" r="2" fill="#FFD86B" stroke="#8B5A2B" stroke-width="0.6"/>
    <circle cx="-3" cy="0" r="1.6" fill="#FFFFFF" stroke="#FFB7B7" stroke-width="0.6"/>
    <circle cx="3" cy="0"  r="1.6" fill="#FFFFFF" stroke="#FFB7B7" stroke-width="0.6"/>
    <circle cx="0" cy="-3" r="1.6" fill="#FFFFFF" stroke="#FFB7B7" stroke-width="0.6"/>
    <circle cx="0" cy="3"  r="1.6" fill="#FFFFFF" stroke="#FFB7B7" stroke-width="0.6"/>
  </g>
  <!-- Sparkle accents -->
  <text x="78" y="22" font-size="9" fill="#FFD86B">✨</text>
</svg>
