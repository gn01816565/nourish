<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Leaf beneath the dew drop -->
  <path d="M 18 64 Q 30 40 70 50 Q 78 64 60 78 Q 32 84 18 64 Z"
        fill="#6BCB77" stroke="#3E8C4A" stroke-width="2" stroke-linejoin="round"/>
  <!-- Leaf central vein -->
  <path d="M 30 70 Q 50 56 68 56" fill="none" stroke="#3E8C4A" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Tiny side veins -->
  <line x1="40" y1="68" x2="38" y2="58" stroke="#3E8C4A" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="64" x2="50" y2="54" stroke="#3E8C4A" stroke-width="1" opacity="0.5"/>
  <line x1="60" y1="60" x2="60" y2="50" stroke="#3E8C4A" stroke-width="1" opacity="0.5"/>
  <!-- Dew drop body — teardrop shape (ellipse + pointed top) -->
  <path d="M 50 18 Q 38 38 38 48 Q 38 60 50 60 Q 62 60 62 48 Q 62 38 50 18 Z"
        fill="#6BCBFF" fill-opacity="0.55"
        stroke="#FF89A7" stroke-width="2"/>
  <!-- Inner shine ellipse for water-droplet glass feel -->
  <ellipse cx="44" cy="44" rx="5" ry="9" fill="#FFFFFF" opacity="0.7"/>
  <!-- Smaller secondary shine -->
  <ellipse cx="56" cy="52" rx="2" ry="3" fill="#FFFFFF" opacity="0.5"/>
  <!-- Sparkle accents — fairycore atmospheric -->
  <text x="78" y="22" font-size="10" fill="#FFD86B">✦</text>
  <text x="14" y="24" font-size="9" fill="#FFB7B7">✿</text>
  <circle cx="22" cy="38" r="1.4" fill="#FFD86B" opacity="0.8"/>
  <circle cx="80" cy="40" r="1.4" fill="#6BCBFF" opacity="0.8"/>
</svg>
