<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- kawaii-decora 2nd: 彩色糖果罐 — 跟 decora_clips (iter#229) 同軸「堆量」narrative.
       Glass jar + 7+ pastel candies 堆疊 + 多色 ✦ + pink ribbon — 跟 minimalism「only 1」narrative 直接對立. -->
  <!-- Soft pink ground shadow -->
  <ellipse cx="50" cy="86" rx="32" ry="3" fill="#FFC8D6" opacity="0.55"/>
  <!-- Glass jar body (rounded rect, soft cyan-tinted clear glass feel) -->
  <path d="M 28 38 Q 28 34 32 34 L 68 34 Q 72 34 72 38 L 72 80 Q 72 84 68 84 L 32 84 Q 28 84 28 80 Z"
        fill="#FFFFFF" fill-opacity="0.7" stroke="#8B5A2B" stroke-width="1.6" stroke-linejoin="round"/>
  <!-- Glass highlight (single thin sheen line on left) -->
  <path d="M 32 42 L 32 78" fill="none" stroke="#FFFFFF" stroke-width="1.2" opacity="0.85"/>
  <!-- Jar neck rim (cream band) -->
  <rect x="30" y="32" width="40" height="4" rx="1" fill="#FFE8C8" stroke="#8B5A2B" stroke-width="1.2"/>
  <!-- Heart-shaped lid (pink + heart handle) -->
  <ellipse cx="50" cy="30" rx="22" ry="3" fill="#FFB7B7" stroke="#FF89A7" stroke-width="1.2"/>
  <text x="50" y="28" font-size="9" fill="#B23A48" text-anchor="middle">♥</text>
  <!-- 9 pastel candies inside (堆量 narrative — 跟 minimalism「1 only」對立) -->
  <!-- Layer 1 (bottom row) -->
  <circle cx="38" cy="74" r="3.5" fill="#FFB7B7" stroke="#FF89A7" stroke-width="0.6"/>
  <circle cx="46" cy="76" r="3.5" fill="#FFD86B" stroke="#8B5A2B" stroke-width="0.6"/>
  <circle cx="54" cy="76" r="3.5" fill="#6BCBFF" fill-opacity="0.7" stroke="#8B5A2B" stroke-width="0.6"/>
  <circle cx="62" cy="74" r="3.5" fill="#D6C8FF" stroke="#8B5A2B" stroke-width="0.6"/>
  <!-- Layer 2 (middle row) -->
  <circle cx="40" cy="64" r="3.5" fill="#6BCB77" fill-opacity="0.65" stroke="#8B5A2B" stroke-width="0.6"/>
  <circle cx="50" cy="66" r="3.5" fill="#FF89A7" stroke="#B23A48" stroke-width="0.6"/>
  <circle cx="60" cy="64" r="3.5" fill="#FFE8C8" stroke="#8B5A2B" stroke-width="0.6"/>
  <!-- Layer 3 (top row, partial) -->
  <circle cx="44" cy="54" r="3.5" fill="#B23A48" stroke="#8B2030" stroke-width="0.6"/>
  <circle cx="56" cy="54" r="3.5" fill="#FFD86B" stroke="#8B5A2B" stroke-width="0.6"/>
  <!-- Tiny candy stripe accents (2 candies w/ stripes for variety) -->
  <line x1="36" y1="74" x2="40" y2="74" stroke="#FFFFFF" stroke-width="0.7" opacity="0.8"/>
  <line x1="58" y1="76" x2="62" y2="76" stroke="#FFFFFF" stroke-width="0.7" opacity="0.8"/>
  <!-- Pink ribbon tied around jar neck (kawaii decoration) -->
  <path d="M 25 36 Q 22 38 25 40 Q 28 38 25 36 Z" fill="#FFB7B7" stroke="#FF89A7" stroke-width="0.8"/>
  <path d="M 75 36 Q 78 38 75 40 Q 72 38 75 36 Z" fill="#FFB7B7" stroke="#FF89A7" stroke-width="0.8"/>
  <line x1="28" y1="38" x2="72" y2="38" stroke="#FFB7B7" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Multiple ✦ sparkles (kawaii narrative = 堆量) -->
  <text x="14" y="22" font-size="8" fill="#FFD86B">✦</text>
  <text x="86" y="26" font-size="6" fill="#FFB7B7">✦</text>
  <text x="84" y="60" font-size="7" fill="#6BCBFF">✦</text>
  <text x="14" y="66" font-size="6" fill="#D6C8FF">✦</text>
</svg>
