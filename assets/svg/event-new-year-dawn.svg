<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- minimalist seasonal: new year dawn (01-01 anchor, 7-day window).
       Pure white snow + single thin tree + single soft sun + single small bird;
       pairs with morning_coffee (iter#224 daily ritual) at yearly scale.
       TA softening: pink dawn sky tint + corner dot per CLAUDE.md TA「avoid 過冷」. -->
  <!-- Dawn sky band (soft cream-pink gradient feel via stacked rects, no <defs> needed) -->
  <rect x="0" y="0" width="100" height="48" fill="#FFE8C8" opacity="0.55"/>
  <rect x="0" y="0" width="100" height="22" fill="#FFB7B7" opacity="0.32"/>
  <!-- Single soft sun (cream + warm pink halo) — single circle, minimalism narrative -->
  <circle cx="68" cy="32" r="14" fill="#FFB7B7" opacity="0.30"/>
  <circle cx="68" cy="32" r="10" fill="#FFE8C8" opacity="0.65"/>
  <circle cx="68" cy="32" r="6.5" fill="#FFFFFF" opacity="0.85"/>
  <!-- Snow ground (clean white horizon, single subtle line for depth) -->
  <rect x="0" y="62" width="100" height="38" fill="#FFFFFF" opacity="0.95"/>
  <line x1="0" y1="62" x2="100" y2="62" stroke="#FFE8C8" stroke-width="0.8" opacity="0.7"/>
  <!-- Soft pink ground shadow (TA softening accent) -->
  <ellipse cx="50" cy="88" rx="40" ry="2.6" fill="#FFC8D6" opacity="0.45"/>
  <!-- Single thin tree silhouette (left side, minimalist single line trunk + sparse branches) -->
  <line x1="26" y1="62" x2="26" y2="30" stroke="#8B5A2B" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Tree branches (3 single thin lines, sparse not bushy — minimalism narrative) -->
  <line x1="26" y1="38" x2="20" y2="32" stroke="#8B5A2B" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="26" y1="42" x2="32" y2="36" stroke="#8B5A2B" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="26" y1="48" x2="20" y2="44" stroke="#8B5A2B" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Snow tips on branches (single tiny white circles, not multiple per branch) -->
  <circle cx="20" cy="32" r="1.2" fill="#FFFFFF" stroke="#FFE8C8" stroke-width="0.4"/>
  <circle cx="32" cy="36" r="1.2" fill="#FFFFFF" stroke="#FFE8C8" stroke-width="0.4"/>
  <!-- Single small bird flying toward sun (minimalism = 1 bird, not flock) -->
  <path d="M 48 28 Q 50 26 52 28 Q 54 26 56 28" fill="none" stroke="#8B5A2B" stroke-width="1.1" stroke-linecap="round"/>
  <!-- Single coffee cup on snow ground (callback to morning_coffee — yearly ritual extends daily ritual) -->
  <ellipse cx="50" cy="76" rx="5" ry="1" fill="#FFC8D6" opacity="0.55"/>
  <path d="M 46 68 Q 46 75 50 76 Q 54 75 54 68 Z" fill="#FFFFFF" stroke="#8B5A2B" stroke-width="0.9"/>
  <ellipse cx="50" cy="68" rx="4" ry="0.9" fill="#FFE8C8" stroke="#8B5A2B" stroke-width="0.7"/>
  <ellipse cx="50" cy="68" rx="3.2" ry="0.6" fill="#8B5A2B" opacity="0.85"/>
  <!-- Single steam wisp from cup (minimalism, single curve) -->
  <path d="M 50 66 Q 48 62 50 58" fill="none" stroke="#8B5A2B" stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>
  <!-- Soft pink corner dot (TA softening, 1 only per minimalism rule) -->
  <circle cx="14" cy="14" r="1.6" fill="#FFB7B7" opacity="0.85"/>
  <!-- Single ✦ sparkle (minimalism = 1) -->
  <text x="84" y="58" font-size="9" fill="#FFD86B">✦</text>
</svg>
