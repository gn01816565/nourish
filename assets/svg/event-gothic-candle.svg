<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- dark academia seasonal: gothic candle + open book + tiny pumpkin for Halloween (10-31).
       Deep wine + brass + parchment palette per dark academia, softened with cottagecore pinks
       per CLAUDE.md TA「avoid 過冷 / 過男性化」. -->
  <!-- Soft pink ground shadow -->
  <ellipse cx="50" cy="88" rx="36" ry="3.5" fill="#FFC8D6" opacity="0.55"/>
  <!-- Open book lying flat (parchment open spread) — left page tilted -->
  <path d="M 14 66 L 50 62 L 50 84 L 14 86 Z" fill="#FFE8C8" stroke="#8B5A2B" stroke-width="1.4" stroke-linejoin="round"/>
  <path d="M 50 62 L 86 66 L 86 86 L 50 84 Z" fill="#FFE8C8" stroke="#8B5A2B" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- Book spine center crease -->
  <line x1="50" y1="62" x2="50" y2="84" stroke="#8B5A2B" stroke-width="1.2"/>
  <!-- Page text lines (deep wine handwritten flow) -->
  <line x1="18" y1="70" x2="44" y2="68" stroke="#8B2030" stroke-width="0.7" opacity="0.7"/>
  <line x1="18" y1="74" x2="44" y2="72" stroke="#8B2030" stroke-width="0.7" opacity="0.7"/>
  <line x1="18" y1="78" x2="40" y2="76" stroke="#8B2030" stroke-width="0.7" opacity="0.7"/>
  <line x1="56" y1="68" x2="82" y2="70" stroke="#8B2030" stroke-width="0.7" opacity="0.7"/>
  <line x1="56" y1="72" x2="82" y2="74" stroke="#8B2030" stroke-width="0.7" opacity="0.7"/>
  <line x1="56" y1="76" x2="78" y2="78" stroke="#8B2030" stroke-width="0.7" opacity="0.7"/>
  <!-- Brass candle holder base (saucer) -->
  <ellipse cx="50" cy="56" rx="14" ry="2.6" fill="#FFD86B" stroke="#8B5A2B" stroke-width="1.2"/>
  <!-- Holder stem (narrow brass column) -->
  <rect x="46" y="50" width="8" height="6" fill="#FFD86B" stroke="#8B5A2B" stroke-width="1"/>
  <!-- Candle body (deep wine pillar) -->
  <rect x="44" y="28" width="12" height="22" rx="1.5" fill="#8B2030" stroke="#5C1A1F" stroke-width="1.4"/>
  <!-- Candle wax drip (single, gothic narrative) -->
  <path d="M 56 36 Q 58 40 56 42 Q 54 40 56 36 Z" fill="#FFB7B7" stroke="#8B2030" stroke-width="0.5"/>
  <!-- Wick (thin black) -->
  <line x1="50" y1="28" x2="50" y2="22" stroke="#2C2C2C" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Flame (warm orange + cream center) -->
  <path d="M 50 22 Q 46 18 48 14 Q 50 10 50 14 Q 52 10 52 14 Q 54 18 50 22 Z" fill="#FF9F43" stroke="#FFD86B" stroke-width="0.9"/>
  <ellipse cx="50" cy="17" rx="1.2" ry="2.2" fill="#FFE8C8"/>
  <!-- Halo glow around flame (warm pink TA softening — gothic 不全冷) -->
  <circle cx="50" cy="16" r="9" fill="#FFB7B7" opacity="0.18"/>
  <!-- Tiny pumpkin sitting on right page (gothic Halloween motif, kawaii-soft) -->
  <ellipse cx="74" cy="60" rx="5" ry="4" fill="#FF9F43" stroke="#8B5A2B" stroke-width="1"/>
  <line x1="74" y1="56" x2="74" y2="64" stroke="#5C3A1B" stroke-width="0.5" opacity="0.6"/>
  <line x1="71" y1="57" x2="71" y2="63" stroke="#5C3A1B" stroke-width="0.4" opacity="0.5"/>
  <line x1="77" y1="57" x2="77" y2="63" stroke="#5C3A1B" stroke-width="0.4" opacity="0.5"/>
  <!-- Pumpkin stem -->
  <rect x="73" y="55" width="2" height="2" fill="#3E8C4A" stroke="#5C3A1B" stroke-width="0.5"/>
  <!-- Soft pink corner accent dot (TA softening, gothic narrative 不放棄 cottagecore palette) -->
  <circle cx="14" cy="20" r="1.6" fill="#FFB7B7" opacity="0.85"/>
  <!-- Single ✦ sparkle -->
  <text x="84" y="28" font-size="9" fill="#FFD86B">✦</text>
</svg>
