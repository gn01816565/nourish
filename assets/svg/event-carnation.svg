<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Stem -->
  <path d="M 50 50 Q 50 70 50 84" stroke="#3E8C4A" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Two side leaves -->
  <path d="M 50 64 Q 36 60 32 70 Q 44 72 50 70 Z" fill="#6BCB77" stroke="#3E8C4A" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M 50 72 Q 64 68 68 78 Q 56 80 50 78 Z" fill="#6BCB77" stroke="#3E8C4A" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Carnation bloom — outer ruffle layer (frilly edge via zigzag path) -->
  <path d="M 22 36 L 28 32 L 30 38 L 36 28 L 40 36 L 46 26 L 50 34 L 54 26 L 60 36 L 64 28 L 70 38 L 72 32 L 78 36 L 76 44 L 78 50 L 70 50 L 64 56 L 58 50 L 50 56 L 42 50 L 36 56 L 30 50 L 22 50 L 24 44 Z"
        fill="#FFB7B7" stroke="#FF89A7" stroke-width="2" stroke-linejoin="round"/>
  <!-- Middle ruffle layer (slightly smaller, deeper pink) -->
  <path d="M 32 40 L 36 36 L 40 42 L 44 36 L 50 42 L 56 36 L 60 42 L 64 36 L 68 40 L 66 46 L 68 50 L 60 48 L 54 52 L 50 48 L 46 52 L 40 48 L 32 50 L 34 46 Z"
        fill="#FF89A7" stroke="#B23A48" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Inner cluster (deepest pink — central bud area) -->
  <ellipse cx="50" cy="44" rx="11" ry="6" fill="#B23A48" stroke="#8B2030" stroke-width="1.5"/>
  <ellipse cx="46" cy="42" rx="3" ry="2" fill="#FFB7B7" opacity="0.7"/>
  <ellipse cx="54" cy="44" rx="3" ry="2" fill="#FFB7B7" opacity="0.7"/>
  <!-- Ribbon at base of stem (golden tie — Mother's Day badge) -->
  <ellipse cx="50" cy="76" rx="6" ry="2.5" fill="#FFD86B" stroke="#8B5A2B" stroke-width="1.2"/>
  <path d="M 44 76 L 40 82" stroke="#FFD86B" stroke-width="2" stroke-linecap="round"/>
  <path d="M 56 76 L 60 82" stroke="#FFD86B" stroke-width="2" stroke-linecap="round"/>
  <!-- Heart sparkle accents (Mother's Day theme) -->
  <text x="14" y="22" font-size="9" fill="#FFB7B7">♥</text>
  <text x="80" y="22" font-size="10" fill="#FFD86B">✦</text>
</svg>
