<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- v0.6 minimalist 軸第三件（達軸成形 ≥ 3 件 GDD §5.5 門檻）：簡約一字夾 — single thin gold bobby bar pin.
       Hat slot (跟 minimal_chain neck slot 區隔，可同時佩戴 mixing-mode).
       Single line + single accent，跟 strawberry_clip / star_clip 已有 hat clip 視覺區隔（後者有 figurative motif，本件 = 純 single bar 線條）.
       TA 軟化：1 顆 corner pink dot + cream highlight，不走 pure cold scandinavian. -->
  <!-- Subtle cream background swatch for depth (very faint) -->
  <rect x="20" y="44" width="60" height="12" rx="6" fill="#FFE8C8" opacity="0.35"/>
  <!-- Main bobby pin bar — thin gold rectangle, rounded ends, horizontal -->
  <rect x="22" y="48" width="56" height="4" rx="2" fill="#FFD86B" stroke="#8B5A2B" stroke-width="0.9"/>
  <!-- Bar inner highlight (single thin line for metallic sheen) -->
  <line x1="26" y1="49.5" x2="74" y2="49.5" stroke="#FFFFFF" stroke-width="0.6" opacity="0.7"/>
  <!-- Left clasp loop (where pin opens) — single small circle outline -->
  <circle cx="22" cy="50" r="2.4" fill="none" stroke="#8B5A2B" stroke-width="0.9"/>
  <circle cx="22" cy="50" r="1.4" fill="#FFE8C8" opacity="0.85"/>
  <!-- Right pointed end (slight tip suggestion) -->
  <path d="M 78 48 L 82 50 L 78 52 Z" fill="#FFD86B" stroke="#8B5A2B" stroke-width="0.7" stroke-linejoin="round"/>
  <!-- Single small pearl-like accent at center bar (minimalism = 1 only, not 3-5) -->
  <circle cx="50" cy="50" r="1.6" fill="#FFFFFF" stroke="#8B5A2B" stroke-width="0.4"/>
  <circle cx="49.5" cy="49.5" r="0.6" fill="#FFE8C8" opacity="0.9"/>
  <!-- Single soft pink corner dot (TA softening — minimalism allows 1 not堆量) -->
  <circle cx="14" cy="20" r="1.6" fill="#FFB7B7" opacity="0.85"/>
  <!-- Single ✦ sparkle (minimalism narrative = 1 sparkle, not 3) -->
  <text x="84" y="78" font-size="7" fill="#FFD86B" text-anchor="middle">✦</text>
</svg>
