<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Soft drop shadow under folded towel -->
  <ellipse cx="50" cy="86" rx="32" ry="4" fill="#FFC8D6" opacity="0.5"/>
  <!-- Folded towel: layered rounded rectangles, slightly tilted for stack feel -->
  <!-- Bottom layer (cream) -->
  <rect x="14" y="60" width="72" height="22" rx="4" fill="#FFF8E7" stroke="#FF89A7" stroke-width="2"/>
  <!-- Middle layer (pastel pink) -->
  <rect x="18" y="46" width="64" height="20" rx="4" fill="#FFB7B7" stroke="#FF89A7" stroke-width="2"/>
  <!-- Top layer (cream again) -->
  <rect x="22" y="34" width="56" height="18" rx="4" fill="#FFF8E7" stroke="#FF89A7" stroke-width="2"/>
  <!-- Decorative stripe band on middle pink layer -->
  <line x1="22" y1="56" x2="78" y2="56" stroke="#FF89A7" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.7"/>
  <!-- Tiny embroidered heart on top layer (small detail) -->
  <path d="M 50 41 q -2 -3 -4 -1 q -2 2 0 4 q 1.5 1.5 4 3 q 2.5 -1.5 4 -3 q 2 -2 0 -4 q -2 -2 -4 1 z" fill="#FFB7B7" stroke="#FF89A7" stroke-width="0.8"/>
  <!-- Steam / fluff puffs above (suggesting fresh/warm towel) -->
  <circle cx="32" cy="22" r="4" fill="#FFFFFF" stroke="#FFD8DD" stroke-width="1.2" opacity="0.85"/>
  <circle cx="50" cy="16" r="5" fill="#FFFFFF" stroke="#FFD8DD" stroke-width="1.2" opacity="0.85"/>
  <circle cx="68" cy="22" r="4" fill="#FFFFFF" stroke="#FFD8DD" stroke-width="1.2" opacity="0.85"/>
  <!-- Sparkle accent -->
  <text x="80" y="36" font-size="9" fill="#FFD86B">✨</text>
</svg>
