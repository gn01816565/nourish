<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Boho axis 1st accessory: braided fringe ribbon worn around neck slot.
       Earth-tone palette softened with cottagecore pinks per CLAUDE.md TA. -->
  <!-- Main ribbon band (warm cream with pink-rust trim) -->
  <rect x="14" y="42" width="72" height="14" rx="2.5" fill="#FFE8C8" stroke="#8B5A2B" stroke-width="2"/>
  <!-- Woven cross-stitch pattern (3 rust-pink V's) -->
  <path d="M 24 44 L 27 50 L 30 44" fill="none" stroke="#B23A48" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 47 44 L 50 50 L 53 44" fill="none" stroke="#B23A48" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 70 44 L 73 50 L 76 44" fill="none" stroke="#B23A48" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Tiny cream dots between V's (boho beads) -->
  <circle cx="38" cy="49" r="1.4" fill="#FFD86B" stroke="#8B5A2B" stroke-width="0.8"/>
  <circle cx="61" cy="49" r="1.4" fill="#FFD86B" stroke="#8B5A2B" stroke-width="0.8"/>
  <!-- Fringe tassels hanging from bottom — 11 alternating cream/rust strands -->
  <g stroke-width="2" stroke-linecap="round">
    <line x1="18" y1="56" x2="18" y2="68" stroke="#FFE8C8"/>
    <line x1="24" y1="56" x2="24" y2="72" stroke="#FFB7B7"/>
    <line x1="30" y1="56" x2="30" y2="70" stroke="#FFE8C8"/>
    <line x1="36" y1="56" x2="36" y2="74" stroke="#B23A48"/>
    <line x1="42" y1="56" x2="42" y2="68" stroke="#FFE8C8"/>
    <line x1="48" y1="56" x2="48" y2="76" stroke="#FFB7B7"/>
    <line x1="54" y1="56" x2="54" y2="70" stroke="#FFE8C8"/>
    <line x1="60" y1="56" x2="60" y2="74" stroke="#B23A48"/>
    <line x1="66" y1="56" x2="66" y2="68" stroke="#FFE8C8"/>
    <line x1="72" y1="56" x2="72" y2="72" stroke="#FFB7B7"/>
    <line x1="78" y1="56" x2="78" y2="70" stroke="#FFE8C8"/>
  </g>
  <!-- Fringe tip beads (only on darker rust strands) -->
  <circle cx="36" cy="76" r="1.5" fill="#FFD86B" stroke="#8B5A2B" stroke-width="0.6"/>
  <circle cx="60" cy="76" r="1.5" fill="#FFD86B" stroke="#8B5A2B" stroke-width="0.6"/>
  <!-- Tie ends extending past ribbon edge -->
  <line x1="14" y1="42" x2="6" y2="38" stroke="#8B5A2B" stroke-width="2" stroke-linecap="round"/>
  <line x1="86" y1="42" x2="94" y2="38" stroke="#8B5A2B" stroke-width="2" stroke-linecap="round"/>
  <!-- Tiny sparkle for charm -->
  <text x="78" y="22" font-size="9" fill="#FFD86B">✨</text>
</svg>
