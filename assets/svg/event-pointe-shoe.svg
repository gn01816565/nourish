<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Soft pink shadow under shoe -->
  <ellipse cx="50" cy="84" rx="28" ry="3.5" fill="#FFC8D6" opacity="0.55"/>
  <!-- Pointe shoe body — silhouette of a side-view ballet shoe.
       Toe at left, heel/opening at right. -->
  <path d="M 18 64 Q 16 56 22 52 Q 30 48 44 50 Q 60 52 72 56 Q 82 60 80 70 Q 76 76 64 78 Q 50 80 36 78 Q 22 76 18 70 Z"
        fill="#FFB7B7" stroke="#FF89A7" stroke-width="2" stroke-linejoin="round"/>
  <!-- Inner sole / shadow band -->
  <path d="M 26 70 Q 36 74 50 75 Q 64 75 74 70" fill="none" stroke="#FF89A7" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Drawstring / opening at the heel side (right edge) -->
  <ellipse cx="74" cy="62" rx="6" ry="3.5" fill="#FFC8D6" stroke="#FF89A7" stroke-width="1.5"/>
  <!-- Two satin ribbons trailing up from the ankle area -->
  <path d="M 70 58 Q 64 38 70 22" fill="none" stroke="#FFB7B7" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 76 60 Q 84 42 78 26" fill="none" stroke="#FFC8D6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Ribbon ends with tiny curl -->
  <circle cx="70" cy="22" r="1.5" fill="#FF89A7"/>
  <circle cx="78" cy="26" r="1.5" fill="#FF89A7"/>
  <!-- Tiny embroidered detail on shoe top -->
  <circle cx="44" cy="58" r="1.5" fill="#FFD86B" stroke="#FF89A7" stroke-width="0.8"/>
  <!-- Sparkle accents -->
  <text x="14" y="22" font-size="9" fill="#FFD86B">✨</text>
  <text x="84" y="80" font-size="8" fill="#FFB7B7">♥</text>
</svg>
