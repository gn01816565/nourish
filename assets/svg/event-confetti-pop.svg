<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Soft pink shadow under popper -->
  <ellipse cx="50" cy="86" rx="20" ry="3" fill="#FFC8D6" opacity="0.5"/>
  <!-- Confetti popper / cone — pointed-down triangle in bright pink -->
  <path d="M 36 56 L 64 56 L 50 86 Z"
        fill="#FF89A7" stroke="#B23A48" stroke-width="2" stroke-linejoin="round"/>
  <!-- Cone band stripes -->
  <line x1="38" y1="62" x2="62" y2="62" stroke="#FFD86B" stroke-width="1.8"/>
  <line x1="40" y1="68" x2="60" y2="68" stroke="#FFD86B" stroke-width="1.5"/>
  <!-- Burst of streamers and confetti shooting upward from cone tip -->
  <!-- 3 ribbon streamers (curly path) -->
  <path d="M 50 56 Q 38 40 32 22" fill="none" stroke="#FFB7B7" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 50 56 Q 50 36 52 18" fill="none" stroke="#FFD86B" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 50 56 Q 62 40 70 22" fill="none" stroke="#6BCBFF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Confetti dots scattered around -->
  <rect x="22" y="32" width="4" height="4" fill="#FFD86B" transform="rotate(20 24 34)"/>
  <rect x="76" y="34" width="4" height="4" fill="#FFB7B7" transform="rotate(-15 78 36)"/>
  <rect x="32" y="14" width="3" height="5" fill="#6BCBFF" transform="rotate(30 33.5 16.5)"/>
  <rect x="64" y="12" width="3" height="5" fill="#FF89A7" transform="rotate(-25 65.5 14.5)"/>
  <rect x="42" y="8"  width="3" height="3" fill="#FFD86B"/>
  <circle cx="20" cy="46" r="1.8" fill="#6BCBFF"/>
  <circle cx="80" cy="48" r="1.8" fill="#FF89A7"/>
  <circle cx="48" cy="22" r="1.5" fill="#FFB7B7"/>
  <!-- Sparkle accents -->
  <text x="14" y="22" font-size="9" fill="#FFD86B">✨</text>
  <text x="84" y="20" font-size="9" fill="#FFD86B">✨</text>
</svg>
