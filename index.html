<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FFD86B">
  <meta name="description" content="啾啾日常 ChickaDay — 純瀏覽器養成小雞，零下載、零帳號、女性向粉嫩風。蛋孵化、餵食、玩耍、進化 7 種終態，9 件飾品自由搭配。">
  <meta name="keywords" content="養成遊戲,小雞,Tamagotchi,啾啾,ChickaDay,寵物,網頁遊戲,PWA,女性向,療癒">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="啾啾日常">
  <title>啾啾日常 ChickaDay</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
  <link rel="icon" type="image/svg+xml" href="assets/svg/chick-baby.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <!-- canonical: update to deployed URL once GitHub Pages is live -->
  <link rel="canonical" href="https://gn01816465.github.io/nourish/">
  <link rel="stylesheet" href="src/style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "VideoGame",
    "name": "啾啾日常 ChickaDay",
    "alternateName": ["啾啾日常", "ChickaDay"],
    "description": "純瀏覽器養成小雞，零下載、零帳號、女性向粉嫩風。蛋孵化、餵食、玩耍、進化 7 種終態，9 件飾品自由搭配。",
    "url": "https://gn01816465.github.io/nourish/",
    "image": "https://gn01816465.github.io/nourish/assets/images/og-image.png",
    "genre": ["Pet Simulation", "Casual", "Idle"],
    "applicationCategory": "GameApplication",
    "operatingSystem": "Web Browser, iOS, Android",
    "browserRequirements": "Requires JavaScript. Requires HTML5.",
    "inLanguage": "zh-TW",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "TWD",
      "availability": "https://schema.org/InStock"
    },
    "author": {
      "@type": "Organization",
      "name": "ChickaDay"
    }
  }
  </script>

  <meta property="og:type" content="website">
  <meta property="og:title" content="啾啾日常 ChickaDay">
  <meta property="og:description" content="在分頁旁陪你工作的小雞養成遊戲，5 分鐘照顧一次就能養出獨一無二的牠。">
  <meta property="og:image" content="assets/images/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="zh_TW">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="啾啾日常 ChickaDay">
  <meta name="twitter:description" content="寵物養成網頁遊戲。純 HTML+JS，無註冊、無內購。">
  <meta name="twitter:image" content="assets/images/og-image.png">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="logo">
        <img src="assets/svg/chick-baby.svg" alt="" width="28" height="28">
        <span class="title">啾啾日常</span>
        <span class="version">v0.1</span>
      </div>
      <div class="header-actions">
        <button id="btn-shop" class="icon-btn" title="裝扮商店" aria-label="裝扮商店" data-i18n-title="header.shop" data-i18n-aria="header.shop">🎀</button>
        <button id="btn-ach" class="icon-btn" title="成就" aria-label="成就" data-i18n-title="header.ach" data-i18n-aria="header.ach">🏅</button>
        <button id="btn-dex" class="icon-btn" title="圖鑑" aria-label="圖鑑" data-i18n-title="header.dex" data-i18n-aria="header.dex">📖</button>
        <button id="btn-settings" class="icon-btn" title="設定" aria-label="設定" data-i18n-title="header.settings" data-i18n-aria="header.settings">⚙️</button>
      </div>
    </header>

    <section class="stats-bar">
      <div class="stat" data-stat="hunger">
        <span class="stat-icon">🍗</span>
        <span class="stat-label" data-i18n="stat.hunger">飢餓</span>
        <div class="bar"><div class="bar-fill" id="bar-hunger"></div></div>
        <span class="stat-value" id="val-hunger">--</span>
      </div>
      <div class="stat" data-stat="mood">
        <span class="stat-icon">💖</span>
        <span class="stat-label" data-i18n="stat.mood">心情</span>
        <div class="bar"><div class="bar-fill" id="bar-mood"></div></div>
        <span class="stat-value" id="val-mood">--</span>
      </div>
      <div class="stat" data-stat="clean">
        <span class="stat-icon">🛁</span>
        <span class="stat-label" data-i18n="stat.clean">清潔</span>
        <div class="bar"><div class="bar-fill" id="bar-clean"></div></div>
        <span class="stat-value" id="val-clean">--</span>
      </div>
      <div class="stat" data-stat="energy">
        <span class="stat-icon">🌙</span>
        <span class="stat-label" data-i18n="stat.energy">體力</span>
        <div class="bar"><div class="bar-fill" id="bar-energy"></div></div>
        <span class="stat-value" id="val-energy">--</span>
      </div>
      <div class="coin">
        💰 <span id="val-coin">0</span> FC
      </div>
    </section>

    <section class="stage" id="stage">
      <div class="stage-bg" id="stage-bg"></div>
      <div class="pet-shadow"></div>
      <button class="pet-wrapper" id="pet-wrapper" type="button" aria-label="輕觸啾啾摸頭" data-i18n-aria="pet.tap">
        <img class="accessory wing" id="acc-wing" src="" alt="" hidden>
        <img class="pet" id="pet-img" src="assets/svg/egg.svg" alt="寵物">
        <img class="accessory face" id="acc-face" src="" alt="" hidden>
        <img class="accessory hat" id="acc-hat" src="" alt="" hidden>
        <img class="accessory neck" id="acc-neck" src="" alt="" hidden>
        <img class="mood-icon" id="mood-icon" src="" alt="" hidden>
        <div class="speech-bubble" id="speech-bubble" hidden></div>
        <div class="want-bubble" id="want-bubble" hidden></div>
      </button>
      <div class="stage-info">
        <span id="stage-name">蛋</span>
        <span class="stage-sep">·</span>
        <span id="stage-countdown">--</span>
      </div>
      <div class="stage-hint" id="stage-hint" hidden></div>
    </section>

    <nav class="action-bar" aria-label="互動操作" data-i18n-aria="actionbar.aria">
      <button class="action-btn" id="btn-feed" aria-label="餵食" data-i18n-aria="help.feed">
        <span class="action-icon" aria-hidden="true">🍗</span>
        <span class="action-label" data-i18n="help.feed">餵食</span>
      </button>
      <button class="action-btn" id="btn-play" aria-label="玩耍" data-i18n-aria="help.play">
        <span class="action-icon" aria-hidden="true">🎮</span>
        <span class="action-label" data-i18n="help.play">玩耍</span>
      </button>
      <button class="action-btn" id="btn-bath" aria-label="洗澡" data-i18n-aria="help.bath">
        <span class="action-icon" aria-hidden="true">🛁</span>
        <span class="action-label" data-i18n="help.bath">洗澡</span>
        <span class="cd" id="cd-bath" hidden></span>
      </button>
      <button class="action-btn" id="btn-sleep" aria-label="睡眠" data-i18n-aria="help.sleep">
        <span class="action-icon" aria-hidden="true">😴</span>
        <span class="action-label" id="sleep-label" data-i18n="help.sleep">睡眠</span>
      </button>
      <button class="action-btn" id="btn-pet" aria-label="愛撫" data-i18n-aria="help.pet">
        <span class="action-icon" aria-hidden="true">💝</span>
        <span class="action-label" data-i18n="help.pet">愛撫</span>
      </button>
    </nav>

    <footer class="footer">
      <span id="task-text">每日任務：載入中…</span>
      <span id="streak">🔥 連續登入 0 天</span>
    </footer>

    <div class="install-banner" id="install-banner" hidden role="region" aria-label="安裝到主畫面" data-i18n-aria="install.title">
      <span class="install-banner-icon" aria-hidden="true">📲</span>
      <span class="install-banner-text" data-i18n="install.title">把啾啾裝到主畫面，一鍵就能照顧～</span>
      <button class="install-banner-yes" id="install-banner-yes" type="button" data-i18n="install.btn.yes">安裝</button>
      <button class="install-banner-no" id="install-banner-no" type="button" aria-label="關閉橫幅" data-i18n-aria="install.btn.no">×</button>
    </div>
  </div>

  <div class="modal" id="modal" hidden role="dialog" aria-modal="true" aria-labelledby="modal-card">
    <div class="modal-bg" data-close></div>
    <div class="modal-card" id="modal-card"></div>
  </div>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="src/cfg.js"></script>
  <script src="src/i18n.js"></script>
  <script src="src/utils.js"></script>
  <script src="src/animations.js"></script>
  <script src="src/notifications.js"></script>
  <script src="src/ui.js"></script>
  <script src="src/dex.js"></script>
  <script src="src/achievements.js"></script>
  <script src="src/audio.js"></script>
  <script src="src/share.js"></script>
  <script src="src/wants.js"></script>
  <script src="src/events.js"></script>
  <script src="src/daily.js"></script>
  <script src="src/idle.js"></script>
  <script src="src/evolve.js"></script>
  <script src="src/shop.js"></script>
  <script src="src/save.js"></script>
  <script src="src/tick.js"></script>
  <script src="src/interactions.js"></script>
  <script src="src/menus.js"></script>
  <script src="src/settings.js"></script>
  <script src="src/render.js"></script>
  <script src="src/game.js"></script>
  <script>
    // PWA registration. Silent on failure — game still works without offline.
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
    // Capture A2HS opportunity so settings page can offer an "install" button
    // even after the browser's auto-prompt is dismissed.
    window.addEventListener("beforeinstallprompt", e => {
      e.preventDefault();
      window.__nourishInstallPrompt = e;
    });
    window.addEventListener("appinstalled", () => { window.__nourishInstallPrompt = null; });
  </script>
</body>
</html>
