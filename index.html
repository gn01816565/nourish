<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FFD86B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="啾啾日常">
  <title>啾啾日常 ChickaDay</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
  <link rel="icon" type="image/svg+xml" href="assets/svg/chick-baby.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="logo">
        <img src="assets/svg/chick-baby.svg" alt="" width="28" height="28">
        <span class="title">啾啾日常</span>
        <span class="version">v0.1</span>
      </div>
      <div class="header-actions">
        <button id="btn-shop" class="icon-btn" title="裝扮商店" aria-label="裝扮商店">🎀</button>
        <button id="btn-ach" class="icon-btn" title="成就" aria-label="成就">🏅</button>
        <button id="btn-dex" class="icon-btn" title="圖鑑" aria-label="圖鑑">📖</button>
        <button id="btn-settings" class="icon-btn" title="設定" aria-label="設定">⚙️</button>
      </div>
    </header>

    <section class="stats-bar">
      <div class="stat" data-stat="hunger">
        <span class="stat-icon">🍗</span>
        <span class="stat-label">飢餓</span>
        <div class="bar"><div class="bar-fill" id="bar-hunger"></div></div>
        <span class="stat-value" id="val-hunger">--</span>
      </div>
      <div class="stat" data-stat="mood">
        <span class="stat-icon">💖</span>
        <span class="stat-label">心情</span>
        <div class="bar"><div class="bar-fill" id="bar-mood"></div></div>
        <span class="stat-value" id="val-mood">--</span>
      </div>
      <div class="stat" data-stat="clean">
        <span class="stat-icon">🛁</span>
        <span class="stat-label">清潔</span>
        <div class="bar"><div class="bar-fill" id="bar-clean"></div></div>
        <span class="stat-value" id="val-clean">--</span>
      </div>
      <div class="stat" data-stat="energy">
        <span class="stat-icon">⚡</span>
        <span class="stat-label">體力</span>
        <div class="bar"><div class="bar-fill" id="bar-energy"></div></div>
        <span class="stat-value" id="val-energy">--</span>
      </div>
      <div class="coin">
        💰 <span id="val-coin">0</span> FC
      </div>
    </section>

    <section class="stage" id="stage">
      <div class="stage-bg" id="stage-bg"></div>
      <div class="pet-shadow"></div>
      <div class="pet-wrapper" id="pet-wrapper">
        <img class="accessory wing" id="acc-wing" src="" alt="" hidden>
        <img class="pet" id="pet-img" src="assets/svg/egg.svg" alt="寵物">
        <img class="accessory face" id="acc-face" src="" alt="" hidden>
        <img class="accessory hat" id="acc-hat" src="" alt="" hidden>
        <img class="accessory neck" id="acc-neck" src="" alt="" hidden>
        <img class="mood-icon" id="mood-icon" src="" alt="" hidden>
        <div class="speech-bubble" id="speech-bubble" hidden></div>
        <div class="want-bubble" id="want-bubble" hidden></div>
      </div>
      <div class="stage-info">
        <span id="stage-name">蛋</span>
        <span class="stage-sep">·</span>
        <span id="stage-countdown">--</span>
      </div>
      <div class="stage-hint" id="stage-hint" hidden></div>
    </section>

    <nav class="action-bar">
      <button class="action-btn" id="btn-feed">
        <span class="action-icon">🍗</span>
        <span class="action-label">餵食</span>
      </button>
      <button class="action-btn" id="btn-play">
        <span class="action-icon">🎮</span>
        <span class="action-label">玩耍</span>
      </button>
      <button class="action-btn" id="btn-bath">
        <span class="action-icon">🛁</span>
        <span class="action-label">洗澡</span>
        <span class="cd" id="cd-bath" hidden></span>
      </button>
      <button class="action-btn" id="btn-sleep">
        <span class="action-icon">😴</span>
        <span class="action-label" id="sleep-label">睡眠</span>
      </button>
      <button class="action-btn" id="btn-pet">
        <span class="action-icon">💝</span>
        <span class="action-label">愛撫</span>
      </button>
    </nav>

    <footer class="footer">
      <span id="task-text">每日任務：載入中…</span>
      <span id="streak">🔥 連續登入 0 天</span>
    </footer>
  </div>

  <div class="modal" id="modal" hidden>
    <div class="modal-bg" data-close></div>
    <div class="modal-card" id="modal-card"></div>
  </div>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="src/cfg.js"></script>
  <script src="src/dex.js"></script>
  <script src="src/share.js"></script>
  <script src="src/game.js"></script>
  <script>
    // PWA registration. Silent on failure — game still works without offline.
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
    // Capture A2HS opportunity so settings page can offer an "install" button
    // even after the browser's auto-prompt is dismissed.
    window.addEventListener("beforeinstallprompt", e => {
      e.preventDefault();
      window.__nourishInstallPrompt = e;
    });
    window.addEventListener("appinstalled", () => { window.__nourishInstallPrompt = null; });
  </script>
</body>
</html>
